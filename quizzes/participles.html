<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Participle Developments — Practice Quiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f2ebdb;
    --bg-paper: #faf5e9;
    --ink: #1a1611;
    --ink-soft: #4a3f33;
    --ink-muted: #7a6b57;
    --accent: #8b2635;
    --accent-deep: #5c1620;
    --gold: #a8824c;
    --correct: #3d6b3d;
    --correct-bg: #e3ecd9;
    --wrong: #8b2635;
    --wrong-bg: #f2dcdc;
    --rule: rgba(26, 22, 17, 0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'EB Garamond', Georgia, serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.6;
    font-size: 19px;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at top left, rgba(168, 130, 76, 0.08), transparent 50%),
      radial-gradient(ellipse at bottom right, rgba(139, 38, 53, 0.05), transparent 50%);
  }

  .container {
    max-width: 820px;
    margin: 0 auto;
    padding: 60px 32px 80px;
  }

  /* ─── Header ─── */
  header {
    text-align: center;
    padding-bottom: 36px;
    border-bottom: 1px solid var(--rule);
    margin-bottom: 48px;
  }

  .eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 18px;
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.4rem, 5vw, 3.6rem);
    font-weight: 500;
    line-height: 1.05;
    letter-spacing: -0.01em;
    margin-bottom: 12px;
  }

  h1 em {
    color: var(--accent);
    font-weight: 500;
  }

  .subtitle {
    font-style: italic;
    color: var(--ink-muted);
    font-size: 1.05rem;
    max-width: 520px;
    margin: 0 auto;
  }

  /* ─── Scoreboard ─── */
  .scoreboard {
    position: sticky;
    top: 16px;
    z-index: 10;
    background: var(--bg-paper);
    border: 1px solid var(--rule);
    border-radius: 2px;
    padding: 14px 22px;
    margin-bottom: 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    box-shadow: 0 2px 0 rgba(26, 22, 17, 0.04);
  }

  .scoreboard-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-muted);
  }

  .scoreboard-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
    font-weight: 600;
    color: var(--ink);
  }

  .scoreboard-value em {
    color: var(--accent);
    font-style: normal;
  }

  .progress-bar {
    height: 3px;
    background: var(--rule);
    border-radius: 2px;
    overflow: hidden;
    flex: 1;
    max-width: 200px;
    margin: 0 16px;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--accent));
    width: 0%;
    transition: width 0.4s ease;
  }

  /* ─── Question card ─── */
  .question {
    background: var(--bg-paper);
    border: 1px solid var(--rule);
    border-radius: 2px;
    padding: 32px 36px;
    margin-bottom: 28px;
    box-shadow: 0 1px 0 rgba(26, 22, 17, 0.03);
    transition: opacity 0.3s ease;
  }

  .q-header {
    display: flex;
    align-items: baseline;
    gap: 14px;
    margin-bottom: 22px;
    padding-bottom: 14px;
    border-bottom: 1px dashed var(--rule);
  }

  .q-number {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    color: var(--gold);
    text-transform: uppercase;
  }

  .q-status {
    margin-left: auto;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .q-status.correct { color: var(--correct); opacity: 1; }
  .q-status.wrong { color: var(--wrong); opacity: 1; }

  .latin {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.65rem;
    font-style: italic;
    font-weight: 500;
    color: var(--ink);
    line-height: 1.4;
    margin-bottom: 26px;
    padding-left: 18px;
    border-left: 2px solid var(--accent);
  }

  /* ─── Options ─── */
  .options {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
    margin-bottom: 20px;
  }

  @media (max-width: 560px) {
    .options { grid-template-columns: 1fr; }
    .container { padding: 40px 20px 60px; }
    .question { padding: 24px 22px; }
    .latin { font-size: 1.35rem; }
  }

  .option {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    border: 1px solid var(--rule);
    background: transparent;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.15s ease;
    font-family: 'EB Garamond', serif;
    font-size: 1rem;
    color: var(--ink-soft);
    text-align: left;
    font-weight: 500;
  }

  .option:hover:not(:disabled) {
    border-color: var(--accent);
    background: rgba(139, 38, 53, 0.04);
    color: var(--ink);
  }

  .option.selected {
    border-color: var(--ink);
    background: var(--ink);
    color: var(--bg-paper);
  }

  .option.correct-answer {
    border-color: var(--correct);
    background: var(--correct-bg);
    color: var(--correct);
  }

  .option.wrong-answer {
    border-color: var(--wrong);
    background: var(--wrong-bg);
    color: var(--wrong);
  }

  .option:disabled {
    cursor: default;
  }

  .option-letter {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    margin-right: 12px;
    opacity: 0.6;
  }

  /* ─── Check button & feedback ─── */
  .check-btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 10px 24px;
    background: var(--ink);
    color: var(--bg-paper);
    border: none;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .check-btn:hover:not(:disabled) {
    background: var(--accent);
  }

  .check-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  .feedback {
    margin-top: 20px;
    padding: 18px 20px;
    border-left: 3px solid var(--gold);
    background: rgba(168, 130, 76, 0.06);
    display: none;
    animation: fadeIn 0.3s ease;
  }

  .feedback.show { display: block; }

  .feedback-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 8px;
    display: block;
  }

  .feedback-clue {
    font-weight: 600;
    color: var(--accent);
    font-style: italic;
  }

  .feedback-translation {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px dotted var(--rule);
    color: var(--ink-soft);
  }

  .feedback-translation::before {
    content: "Rendering: ";
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-muted);
    font-style: normal;
    font-weight: normal;
  }

  .feedback-translation-text {
    font-style: italic;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ─── Final result ─── */
  .final-result {
    display: none;
    text-align: center;
    padding: 60px 32px;
    background: var(--bg-paper);
    border: 1px solid var(--rule);
    border-radius: 2px;
    margin-top: 40px;
  }

  .final-result.show { display: block; animation: fadeIn 0.5s ease; }

  .final-score {
    font-family: 'Cormorant Garamond', serif;
    font-size: 5rem;
    font-weight: 500;
    color: var(--accent);
    line-height: 1;
    margin: 20px 0 8px;
  }

  .final-score-total {
    color: var(--ink-muted);
    font-size: 2.5rem;
  }

  .final-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
  }

  .final-message {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.5rem;
    font-style: italic;
    color: var(--ink-soft);
    margin: 16px 0 32px;
  }

  .restart-btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 14px 32px;
    background: transparent;
    color: var(--ink);
    border: 1px solid var(--ink);
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .restart-btn:hover {
    background: var(--ink);
    color: var(--bg-paper);
  }

  /* ─── Footer ─── */
  footer {
    text-align: center;
    margin-top: 60px;
    padding-top: 24px;
    border-top: 1px solid var(--rule);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-muted);
  }
</style>
</head>
<body>
<div class="container">

<header>
  <div class="eyebrow">Latina · Practice Set № I</div>
  <h1>Participle <em>Developments</em></h1>
  <p class="subtitle">Identify the logical relationship each participle has with its main clause. Look for the clues.</p>
</header>

<div class="scoreboard">
  <div>
    <div class="scoreboard-label">Score</div>
    <div class="scoreboard-value"><em id="score">0</em> / 22</div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
  <div style="text-align: right;">
    <div class="scoreboard-label">Answered</div>
    <div class="scoreboard-value"><span id="answered">0</span>/22</div>
  </div>
</div>

<div id="quiz"></div>

<div class="final-result" id="final">
  <div class="final-label">Quiz Complete</div>
  <div class="final-score"><span id="finalScore">0</span><span class="final-score-total">/22</span></div>
  <div class="final-message" id="finalMessage"></div>
  <button class="restart-btn" onclick="location.reload()">Restart Quiz</button>
</div>

<footer>Fortes fortuna adiuvat</footer>

</div>

<script>
const TYPES = {
  temporal:    { label: "Temporal",    hint: "when / after / while" },
  causal:      { label: "Causal",      hint: "because / since" },
  concessive:  { label: "Concessive",  hint: "although / even though" },
  conditional: { label: "Conditional", hint: "if" },
  final:       { label: "Final",       hint: "in order to" },
  relative:    { label: "Relative",    hint: "who / which" }
};

const QUESTIONS = [
  {
    latin: "Caesar, urbe capta, exercitum dimisit.",
    answer: "temporal",
    clue: "Ablative absolute describing a clear sequence of events — first the city falls, then Caesar acts. No opposition, no reason, no condition. A simple chronology.",
    translation: "When the city had been captured, Caesar dismissed the army."
  },
  {
    latin: "Puer, a patre laudatus, laetus erat.",
    answer: "causal",
    clue: "The participle expresses the <strong>state that explains</strong> the boy's happiness — being praised is the reason he is cheerful.",
    translation: "Because he was praised by his father, the boy was happy."
  },
  {
    latin: "Athletae, defessi, tamen cursum non reliquerunt.",
    answer: "concessive",
    clue: "The decisive signal is <strong>tamen</strong> in the main clause. Exhaustion would normally stop them; it doesn't. The participle opposes the main verb.",
    translation: "Although exhausted, the athletes nevertheless did not abandon the race."
  },
  {
    latin: "Haec faciens, stultus habereris.",
    answer: "conditional",
    clue: "<strong>Habereris</strong> is imperfect subjunctive — a counterfactual/potential form. That subjunctive in the main clause is the hallmark of a conditional development.",
    translation: "If you did these things, you would be considered foolish."
  },
  {
    latin: "Legatos misit pacem petituros.",
    answer: "final",
    clue: "<strong>Petituros</strong> is a future active participle, attached to <strong>misit</strong> — a verb of motion. This pairing almost always expresses purpose.",
    translation: "He sent ambassadors to seek peace."
  },
  {
    latin: "Liber, a magistro lectus, in mensa iacet.",
    answer: "relative",
    clue: "Purely descriptive: the participle identifies <em>which</em> book lies on the table. No temporal sequence, no reason, no opposition — just characterization. Default to relative.",
    translation: "The book, which was read by the teacher, is lying on the table."
  },
  {
    latin: "Sol oriens, aves canere incipiunt.",
    answer: "temporal",
    clue: "A clear sequence: sunrise, then birdsong. No opposing force (no <em>tamen</em>), no subjunctive, no future participle. Time locates the action.",
    translation: "When the sun rises, the birds begin to sing."
  },
  {
    latin: "Cives, bello fessi, pacem petiverunt.",
    answer: "causal",
    clue: "War-weariness <strong>explains</strong> why the citizens seek peace. The participle gives the motive for the main action — a classic causal development.",
    translation: "Because they were weary of war, the citizens sought peace."
  },
  {
    latin: "Hostes, superati, nihilominus resistebant.",
    answer: "concessive",
    clue: "<strong>Nihilominus</strong> (none the less) is the concessive flag. Defeat would normally end resistance; here it doesn't. The participle opposes the main action.",
    translation: "Although defeated, the enemies nevertheless kept resisting."
  },
  {
    latin: "Hoc audiens, obstupesceres.",
    answer: "conditional",
    clue: "<strong>Obstupesceres</strong> is imperfect subjunctive — a potential / counterfactual form. Subjunctive in the main clause points to a conditional reading.",
    translation: "If you heard this, you would be amazed."
  },
  {
    latin: "Consul copias duxit hostes oppugnaturus.",
    answer: "final",
    clue: "<strong>Oppugnaturus</strong> is a future active participle, attached to a verb of motion (<strong>duxit</strong>). This is the standard Livian / Tacitean way of expressing purpose.",
    translation: "The consul led his troops to attack the enemy."
  },
  {
    latin: "Templum, a Romanis aedificatum, ingens est.",
    answer: "relative",
    clue: "The participle simply tells us <em>which</em> temple is huge. No temporal sequence, no motive, no opposition — a purely identifying phrase. The safe relative reading.",
    translation: "The temple, which was built by the Romans, is huge."
  },
  {
    latin: "Signo dato, milites impetum fecerunt.",
    answer: "temporal",
    clue: "Ablative absolute marking a sequence: the signal is given, then the charge follows. A neutral temporal link — no other logical relation is suggested.",
    translation: "When the signal had been given, the soldiers made an attack."
  },
  {
    latin: "Cicero, veritatem sciens, tacere non potuit.",
    answer: "causal",
    clue: "Knowing the truth <strong>is the reason</strong> Cicero can't stay silent — not merely <em>when</em> he knew it. The participle supplies motive.",
    translation: "Because he knew the truth, Cicero could not be silent."
  },
  {
    latin: "Dux, saucius, tamen milites incitabat.",
    answer: "concessive",
    clue: "<strong>Tamen</strong> in the main clause. A wound would normally stop a commander from rallying troops; here it doesn't. Concessive.",
    translation: "Although wounded, the general nevertheless kept urging on his soldiers."
  },
  {
    latin: "Te rogans, responsum acciperem.",
    answer: "conditional",
    clue: "<strong>Acciperem</strong> is imperfect subjunctive — potential mood. Subjunctive in the apodosis is the diagnostic sign of a conditional participle.",
    translation: "If I asked you, I would receive an answer."
  },
  {
    latin: "Legati venerunt pacem oraturi.",
    answer: "final",
    clue: "<strong>Oraturi</strong> is a future active participle; <strong>venerunt</strong> is a verb of motion. This is the canonical Latin construction for purpose.",
    translation: "The ambassadors came to plead for peace."
  },
  {
    latin: "Vir, togam gerens, senator est.",
    answer: "relative",
    clue: "Purely descriptive: the participle identifies <em>which</em> man is a senator. No cause, no time sequence, no concession. Default to relative.",
    translation: "The man who is wearing the toga is a senator."
  },
  {
    latin: "Caesare duce electo, bellum renovatum est.",
    answer: "temporal",
    clue: "Ablative absolute marking a sequence of events: Caesar is chosen, then the war resumes. A neutral chronological link.",
    translation: "When Caesar had been chosen as leader, the war was renewed."
  },
  {
    latin: "Agricolae, imbrem timentes, domum festinaverunt.",
    answer: "causal",
    clue: "Fear of rain <strong>explains</strong> the hurry home — the participle gives the motive, not merely the timing. Causal.",
    translation: "Because they feared the rain, the farmers hurried home."
  },
  {
    latin: "Graeci, pauci, tamen Persas vicerunt.",
    answer: "concessive",
    clue: "<strong>Tamen</strong> in the main clause. Being few would normally mean defeat; here it doesn't. Opposition between participle and main verb.",
    translation: "Although few, the Greeks nevertheless conquered the Persians."
  },
  {
    latin: "Ad Italiam profectus est res gestas narraturus.",
    answer: "final",
    clue: "<strong>Narraturus</strong> is a future active participle, attached to <strong>profectus est</strong> — a verb of motion. Purpose construction.",
    translation: "He set out for Italy to narrate his deeds."
  }
];

// ─── Render ───
const quizEl = document.getElementById("quiz");
const scoreEl = document.getElementById("score");
const answeredEl = document.getElementById("answered");
const progressEl = document.getElementById("progress");

let score = 0;
let answered = 0;

QUESTIONS.forEach((q, i) => {
  const qEl = document.createElement("div");
  qEl.className = "question";
  qEl.id = `q${i}`;

  const optionsHTML = Object.entries(TYPES).map(([key, t], idx) => `
    <button class="option" data-type="${key}" onclick="selectOption(${i}, '${key}')">
      <span class="option-letter">${String.fromCharCode(65 + idx)}</span>
      <span>${t.label} <em style="color: var(--ink-muted); font-weight: 400; font-size: 0.88em;">— ${t.hint}</em></span>
    </button>
  `).join("");

  qEl.innerHTML = `
    <div class="q-header">
      <span class="q-number">Exercitatio ${String(i + 1).padStart(2, "0")}</span>
      <span class="q-status" id="status${i}"></span>
    </div>
    <p class="latin">${q.latin}</p>
    <div class="options" id="options${i}">${optionsHTML}</div>
    <button class="check-btn" id="check${i}" onclick="checkAnswer(${i})" disabled>Check Answer</button>
    <div class="feedback" id="feedback${i}">
      <span class="feedback-label" id="feedbackLabel${i}"></span>
      <div id="feedbackClue${i}"></div>
      <div class="feedback-translation"><span class="feedback-translation-text" id="feedbackTranslation${i}"></span></div>
    </div>
  `;
  quizEl.appendChild(qEl);
});

const state = {};

function selectOption(qIdx, type) {
  if (state[qIdx]?.locked) return;
  state[qIdx] = { ...state[qIdx], selected: type };
  const opts = document.querySelectorAll(`#options${qIdx} .option`);
  opts.forEach(o => {
    o.classList.toggle("selected", o.dataset.type === type);
  });
  document.getElementById(`check${qIdx}`).disabled = false;
}

function checkAnswer(qIdx) {
  const q = QUESTIONS[qIdx];
  const selected = state[qIdx]?.selected;
  if (!selected) return;

  state[qIdx].locked = true;
  const correct = selected === q.answer;

  const opts = document.querySelectorAll(`#options${qIdx} .option`);
  opts.forEach(o => {
    o.disabled = true;
    o.classList.remove("selected");
    if (o.dataset.type === q.answer) {
      o.classList.add("correct-answer");
    } else if (o.dataset.type === selected && !correct) {
      o.classList.add("wrong-answer");
    }
  });

  const statusEl = document.getElementById(`status${qIdx}`);
  statusEl.textContent = correct ? "✓ Correct" : "✗ Try to remember";
  statusEl.className = `q-status ${correct ? "correct" : "wrong"}`;

  document.getElementById(`check${qIdx}`).style.display = "none";

  const fb = document.getElementById(`feedback${qIdx}`);
  document.getElementById(`feedbackLabel${qIdx}`).textContent =
    `${TYPES[q.answer].label} — the clue`;
  document.getElementById(`feedbackClue${qIdx}`).innerHTML = q.clue;
  document.getElementById(`feedbackTranslation${qIdx}`).textContent = q.translation;
  fb.classList.add("show");

  if (correct) score++;
  answered++;
  updateScoreboard();

  if (answered === QUESTIONS.length) {
    showFinal();
  }
}

function updateScoreboard() {
  scoreEl.textContent = score;
  answeredEl.textContent = answered;
  progressEl.style.width = `${(answered / QUESTIONS.length) * 100}%`;
}

function showFinal() {
  document.getElementById("finalScore").textContent = score;
  const pct = score / QUESTIONS.length;
  let msg;
  if (pct === 1) msg = "Perfectum est — you have mastered the developments.";
  else if (pct >= 0.85) msg = "Optime — a scholar's command of the participle.";
  else if (pct >= 0.7) msg = "Bene — solid grasp, a little polish and you're there.";
  else if (pct >= 0.5) msg = "Satis — review the clues table and try again.";
  else msg = "Noli desperare — return to the rules and work through each type.";
  document.getElementById("finalMessage").textContent = msg;
  document.getElementById("final").classList.add("show");
  setTimeout(() => {
    document.getElementById("final").scrollIntoView({ behavior: "smooth", block: "center" });
  }, 300);
}
</script>
</body>
</html>
